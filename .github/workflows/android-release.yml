name: Android release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    defaults:
      run:
        working-directory: android

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: bash
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/jifo-release.keystore"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/jifo-release.keystore" >> "$GITHUB_ENV"

      - name: Test and build release APK
        run: bash ./gradlew testDebugUnitTest assembleRelease --no-daemon

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/dist/jifo-${GITHUB_REF_NAME}.apk"
          cd "$GITHUB_WORKSPACE/dist"
          sha256sum "jifo-${GITHUB_REF_NAME}.apk" > "jifo-${GITHUB_REF_NAME}.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jifo-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
